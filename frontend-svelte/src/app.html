<!doctype html>
<html lang="%lang%" data-number-format="%numberFormat%" data-date-format="%dateFormat%">
        <head>
                <meta charset="utf-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1" />
                <title>Invio</title>
                <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
                <link rel="preconnect" href="https://fonts.googleapis.com" />
                <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
                <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
                <script>
                  (function() {
                    try {
                      var stored = localStorage.getItem("theme");
                      var pref = window.matchMedia("(prefers-color-scheme: dark)").matches ? "invio" : "invio-light";
                      var theme = stored === "invio" || stored === "invio-light" ? stored : pref;
                      document.documentElement.setAttribute("data-theme", theme);
                    } catch (e) {}
                  })();
                </script>
                %sveltekit.head%
                <style>
                  html {
                    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
                  }
                </style>
        </head>
        <body data-sveltekit-preload-data="hover" class="min-h-screen bg-base-200 text-base-content">
                <div style="display: contents">%sveltekit.body%</div>
        </body>
</html>
